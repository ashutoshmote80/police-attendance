<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA1 Naigaon - Secure Attendance</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p-blue: #002e5b; --p-gold: #f1c40f; --p-green: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { background: var(--p-blue); color: white; width: 100%; padding: 15px 0; text-align: center; border-bottom: 4px solid var(--p-gold); margin-bottom: 20px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer; }
        .btn-search { background: var(--p-blue); } .btn-reg { background: #f39c12; } .btn-att { background: var(--p-green); }
        #aiStatus { font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 8px; border-radius: 5px; background: #fff3cd; color: #856404; }
        #video { width: 100%; border-radius: 10px; margin-top: 15px; display: none; background: #000; transform: scaleX(-1); border: 3px solid var(--p-blue); }
        #msg { margin-top: 10px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 5px; }
        .blink-alert { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="header">
    <h2>LA1 Naigaon Mumbai</h2>
    <p>अँटी-स्पूफिंग हजेरी (Live Check)</p>
</div>

<div class="container">
    <div id="aiStatus">🤖 AI लोड होत आहे...</div>
    
    <input type="text" id="beltNo" placeholder="बकल नंबर टाका">
    <button id="btnSearch" class="btn-search" onclick="checkBelt()" disabled>ओळख पटवा</button>
    
    <div id="msg"></div>
    <video id="video" autoplay playsinline muted></video>
    
    <button id="btnReg" class="btn-reg" style="display:none;" onclick="startLiveness('register_face')">चेहरा नोंदणी सुरू करा</button>
    <button id="btnAtt" class="btn-att" style="display:none;" onclick="startLiveness('mark_attendance')">हजेरी सुरू करा</button>
</div>

<script>
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyoz258DfJgM5KGa1Il8HGJ79nEmlrszX6dL6npHN4DpLHUL1d0-RpeZoCcY-rT1Htt/exec";
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
    let savedDescriptor = null;
    let userLat = "0", userLon = "0";

    let isCheckingLiveness = false;
    let hasBlinked = false;
    let pendingAction = "";

    const aiOptions = new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.25, inputSize: 320 });

    window.onload = function() {
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(() => {
            let st = document.getElementById('aiStatus');
            st.innerText = "✅ AI तयार आहे!"; st.style.background = "#d4edda"; st.style.color = "#155724";
            document.getElementById('btnSearch').disabled = false;
        }).catch(e => {
            document.getElementById('aiStatus').innerText = "❌ इंटरनेट स्लो आहे.";
        });
    };

    function showMsg(text, type="info") {
        let m = document.getElementById('msg');
        m.innerText = text;
        if(type === "alert") { m.className = "blink-alert"; }
        else { m.className = ""; m.style.color = (type==="error"?"red":"blue"); }
    }

    function checkBelt() {
        let belt = document.getElementById('beltNo').value;
        if(!belt) return alert("बकल नंबर टाका");
        showMsg("डेटाबेस तपासत आहे...");

        fetch(GOOGLE_SHEET_URL, { method: 'POST', body: JSON.stringify({action: "verify_belt", belt_no: belt}) })
        .then(r => r.json()).then(data => {
            if(data.status === 'success') {
                showMsg("स्वागत आहे, " + data.name);
                startCam();
                if(data.is_registered && data.descriptor) {
                    savedDescriptor = new Float32Array(JSON.parse(data.descriptor));
                    document.getElementById('btnAtt').style.display = "block";
                    document.getElementById('btnReg').style.display = "none";
                } else {
                    document.getElementById('btnReg').style.display = "block";
                    document.getElementById('btnAtt').style.display = "none";
                }
            } else { showMsg(data.message, "error"); }
        });
    }

    function startCam() {
        let video = document.getElementById('video');
        video.style.display = "block";
        navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}}).then(s => { video.srcObject = s; });
        navigator.geolocation.getCurrentPosition(p => { userLat = p.coords.latitude; userLon = p.coords.longitude; });
    }

    // डोळ्यांमधील अंतर मोजण्याचे सूत्र (EAR - Eye Aspect Ratio)
    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
    function getEAR(eye) {
        const v1 = getDistance(eye[1], eye[5]);
        const v2 = getDistance(eye[2], eye[4]);
        const h = getDistance(eye[0], eye[3]);
        return (v1 + v2) / (2.0 * h);
    }

    function startLiveness(action) {
        pendingAction = action;
        isCheckingLiveness = true;
        hasBlinked = false;
        
        document.getElementById('btnReg').disabled = true;
        document.getElementById('btnAtt').disabled = true;
        document.getElementById('video').style.borderColor = "#e74c3c"; // लाल बॉर्डर
        
        showMsg("👁️ कृपया जीवंत असल्याची खात्री करण्यासाठी 'डोळे मिचकावा' (Blink Eyes)", "alert");
        detectLivenessLoop();
    }

    async function detectLivenessLoop() {
        if(!isCheckingLiveness) return;

        let video = document.getElementById('video');
        try {
            const detection = await faceapi.detectSingleFace(video, aiOptions).withFaceLandmarks().withFaceDescriptor();

            if(detection) {
                const leftEAR = getEAR(detection.landmarks.getLeftEye());
                const rightEAR = getEAR(detection.landmarks.getRightEye());

                // जर डोळे बंद झाले (EAR कमी झाला)
                if (leftEAR < 0.25 && rightEAR < 0.25) {
                    hasBlinked = true;
                    showMsg("✅ डोळे मिचकावले! आता डोळे उघडा...", "info");
                } 
                // जर डोळे पुन्हा उघडले (Blink पूर्ण झाले)
                else if (hasBlinked && leftEAR > 0.28 && rightEAR > 0.28) {
                    isCheckingLiveness = false; // लूप थांबवा
                    document.getElementById('video').style.borderColor = "#27ae60"; // हिरवी बॉर्डर
                    executeFinalAction(detection.descriptor); // फोटो काढा आणि पाठवा
                    return;
                }
            } else {
                showMsg("❌ चेहरा स्पष्ट दिसत नाही. कॅमेऱ्यासमोर या.", "error");
            }
        } catch(e) {}

        setTimeout(detectLivenessLoop, 150); // सतत चेक करत राहा
    }

    function captureExactMoment() {
        let video = document.getElementById('video');
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        return canvas.toDataURL('image/jpeg', 0.6);
    }

    async function executeFinalAction(liveDescriptor) {
        let finalImage = captureExactMoment();

        if (pendingAction === "register_face") {
            showMsg("चेहरा आणि Live Test पास! नोंदणी करत आहे...", "info");
            let descStr = JSON.stringify(Array.from(liveDescriptor));
            
            fetch(GOOGLE_SHEET_URL, {
                method: 'POST', body: JSON.stringify({action: "register_face", belt_no: document.getElementById('beltNo').value, image: finalImage, descriptor: descStr})
            }).then(r => r.json()).then(d => { alert(d.message); location.reload(); });
            
        } else if (pendingAction === "mark_attendance") {
            const distance = faceapi.euclideanDistance(savedDescriptor, liveDescriptor);
            if(distance > 0.55) { 
                showMsg("🚨 काढलेला चेहरा जुळत नाही! (Proxy Alert)", "error");
                document.getElementById('btnAtt').disabled = false;
                return;
            }

            showMsg("चेहरा मॅच झाला! हजेरी लावत आहे...", "info");
            fetch(GOOGLE_SHEET_URL, {
                method: 'POST', body: JSON.stringify({action: "mark_attendance", belt_no: document.getElementById('beltNo').value, lat: userLat, lon: userLon, image: finalImage})
            }).then(r => r.json()).then(d => {
                if(d.status === 'success') { showMsg(d.message, "info"); alert("हजेरी यशस्वी!"); location.reload(); }
                else { showMsg(d.message, "error"); document.getElementById('btnAtt').disabled = false; }
            });
        }
    }
</script>
</body>
</html>
