<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA1 Naigaon Mumbai Hajeri</title>
    <style>
        :root { --police-blue: #002e5b; --police-gold: #f1c40f; --success-green: #27ae60; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { background-color: var(--police-blue); color: white; width: 100%; padding: 20px 0; text-align: center; border-bottom: 4px solid var(--police-gold); margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 22px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-search { background-color: var(--police-blue); }
        .btn-action { background-color: var(--success-green); margin-top: 15px; }
        #message { margin-top: 20px; padding: 12px; border-radius: 8px; display: none; font-weight: bold; }
        #video { width: 100%; border-radius: 12px; border: 3px solid var(--police-blue); margin-top: 15px; display: none; }
        #locationBox { background: #eef2f3; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 13px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LA1 Naigaon Mumbai</h1>
        <p>पोलीस हजेरी प्रणाली (फोटो पुरावा)</p>
    </div>

    <div class="container">
        <input type="text" id="beltNo" placeholder="बकल नंबर टाका">
        <button class="btn-search" onclick="checkBelt()">माहिती शोधा</button>

        <div id="message"></div>
        <video id="video" autoplay playsinline muted></video>
        <div id="locationBox">📍 लोकेशन तपासत आहे...</div>
        <button id="btnSubmit" class="btn-action" style="display:none;" onclick="submitAttendance()">हजेरी नोंदवा (फोटोसह)</button>
    </div>

    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyoz258DfJgM5KGa1Il8HGJ79nEmlrszX6dL6npHN4DpLHUL1d0-RpeZoCcY-rT1Htt/exec";
        let userLat = "0", userLon = "0";

        function showMessage(text, color, bgColor) {
            let msg = document.getElementById('message');
            msg.style.display = "block"; msg.innerText = text;
            msg.style.color = color; msg.style.backgroundColor = bgColor;
        }

        function checkBelt() {
            let belt = document.getElementById('beltNo').value;
            if(!belt) return alert("बकल नंबर टाका");
            
            showMessage("तपासत आहे...", "#000", "#eee");

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "verify_belt", belt_no: belt })
            }).then(res => res.json()).then(data => {
                if(data.status === 'success') {
                    showMessage("स्वागत आहे, " + data.name, "white", "#27ae60");
                    startSystem();
                } else {
                    showMessage(data.message, "white", "#e74c3c");
                }
            });
        }

        function startSystem() {
            document.getElementById('video').style.display = "block";
            document.getElementById('locationBox').style.display = "block";
            document.getElementById('btnSubmit').style.display = "block";
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { document.getElementById('video').srcObject = stream; });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude; userLon = pos.coords.longitude;
                    document.getElementById('locationBox').innerText = "📍 लोकेशन प्राप्त झाले!";
                    document.getElementById('locationBox').style.color = "green";
                });
            }
        }

        function submitAttendance() {
            let video = document.getElementById('video');
            let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            let photo = canvas.toDataURL('image/jpeg');

            showMessage("हजेरी आणि फोटो पाठवत आहे...", "#000", "#fff3cd");

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "mark_attendance",
                    belt_no: document.getElementById('beltNo').value,
                    lat: userLat, lon: userLon,
                    image: photo
                })
            }).then(res => res.json()).then(data => {
                if(data.status === 'success') {
                    showMessage(data.message, "white", "#27ae60");
                    document.getElementById('video').style.display = "none";
                    document.getElementById('btnSubmit').style.display = "none";
                } else {
                    showMessage(data.message, "white", "#e74c3c");
                }
            });
        }
    </script>
</body>
</html>
