<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA1 Naigaon Security Hajeri</title>
    <style>
        :root { --p-blue: #002e5b; --p-gold: #f1c40f; --p-green: #27ae60; --p-red: #e74c3c; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: var(--p-blue); color: white; width: 100%; padding: 15px 0; text-align: center; border-bottom: 4px solid var(--p-gold); }
        .container { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .btn-search { background: var(--p-blue); }
        .btn-reg { background: #f39c12; }
        .btn-att { background: var(--p-green); }
        #message { padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-size: 14px; }
        #video { width: 100%; border-radius: 10px; margin-top: 15px; display: none; transform: scaleX(-1); }
        #location { font-size: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>LA1 Naigaon Mumbai</h2>
    <p>स्मार्ट हजेरी व पडताळणी प्रणाली</p>
</div>

<div class="container">
    <input type="text" id="beltNo" placeholder="बकल नंबर टाका">
    <button class="btn-search" onclick="verifyUser()">ओळख पटवा</button>
    
    <div id="message"></div>
    <video id="video" autoplay playsinline muted></video>
    <div id="location"></div>
    
    <button id="btnReg" class="btn-reg" style="display:none;" onclick="action('register_face')">पहिल्यांदा चेहरा नोंदणी करा</button>
    <button id="btnAtt" class="btn-att" style="display:none;" onclick="action('mark_attendance')">हजेरी नोंदवा (पडताळणीसह)</button>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyoz258DfJgM5KGa1Il8HGJ79nEmlrszX6dL6npHN4DpLHUL1d0-RpeZoCcY-rT1Htt/exec";
    let lat, lon;

    function msg(t, c, b) {
        let m = document.getElementById('message');
        m.style.display="block"; m.innerText=t; m.style.color=c; m.style.backgroundColor=b;
    }

    function verifyUser() {
        let b = document.getElementById('beltNo').value;
        if(!b) return alert("बकल नंबर टाका");
        msg("तपासत आहे...", "black", "#eee");

        fetch(URL, { method: 'POST', body: JSON.stringify({action:"verify_belt", belt_no:b}) })
        .then(r => r.json()).then(d => {
            if(d.status === 'success') {
                msg("स्वागत आहे, " + d.name, "white", "#27ae60");
                startCam();
                // जर रजिस्टर नसेल तर फक्त रजिस्ट्रेशन बटण दाखवा
                if(!d.is_registered) {
                    document.getElementById('btnReg').style.display="block";
                    document.getElementById('btnAtt').style.display="none";
                } else {
                    document.getElementById('btnReg').style.display="none";
                    document.getElementById('btnAtt').style.display="block";
                }
            } else { msg(d.message, "white", "#e74c3c"); }
        });
    }

    function startCam() {
        document.getElementById('video').style.display="block";
        navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
        .then(s => { document.getElementById('video').srcObject=s; });
        
        navigator.geolocation.getCurrentPosition(p => {
            lat = p.coords.latitude; lon = p.coords.longitude;
            document.getElementById('location').innerText="📍 लोकेशन प्राप्त झाले";
        });
    }

    function action(actType) {
        let v = document.getElementById('video');
        let c = document.createElement('canvas');
        c.width=v.videoWidth; c.height=v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        let img = c.toDataURL('image/jpeg');

        msg(actType==='register_face' ? "चेहरा नोंदवत आहे..." : "ओळख पडताळत आहे...", "black", "#fff3cd");

        fetch(URL, {
            method: 'POST',
            body: JSON.stringify({
                action: actType,
                belt_no: document.getElementById('beltNo').value,
                image: img,
                lat: lat, lon: lon
            })
        }).then(r => r.json()).then(d => {
            if(d.status === 'success') {
                msg(d.message, "white", "#27ae60");
                if(actType==='register_face') verifyUser(); // पुन्हा चेक करा म्हणजे हजेरी बटण येईल
            } else { msg(d.message, "white", "#e74c3c"); }
        });
    }
</script>
</body>
</html>
