<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA1 Naigaon - Fast Hajeri</title>
    <style>
        :root { --p-blue: #002e5b; --p-gold: #f1c40f; --p-green: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: var(--p-blue); color: white; width: 100%; padding: 15px 0; text-align: center; border-bottom: 4px solid var(--p-gold); }
        .container { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; margin-top: 10px; cursor: pointer; }
        .btn-search { background: var(--p-blue); }
        .btn-att { background: var(--p-green); }
        #video { width: 100%; border-radius: 10px; margin-top: 15px; display: none; background: #000; transform: scaleX(-1); }
        #status { font-size: 14px; font-weight: bold; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="header">
    <h2>LA1 Naigaon Mumbai</h2>
    <p>पोलीस हजेरी प्रणाली</p>
</div>

<div class="container">
    <input type="text" id="beltNo" placeholder="बकल नंबर टाका">
    <button id="btnSearch" class="btn-search" onclick="verifyUser()">ओळख पटवा</button>
    
    <div id="status">प्रतीक्षा करा...</div>
    <video id="video" autoplay playsinline muted></video>
    
    <button id="btnAction" class="btn-att" style="display:none;" onclick="takeAttendance()">हजेरी नोंदवा</button>
</div>

<script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoz258DfJgM5KGa1Il8HGJ79nEmlrszX6dL6npHN4DpLHUL1d0-RpeZoCcY-rT1Htt/exec";
    let isRegistered = false;
    let userLat, userLon;

    function verifyUser() {
        let belt = document.getElementById('beltNo').value;
        if(!belt) return alert("बकल नंबर टाका");
        
        document.getElementById('status').innerText = "डेटाबेस तपासत आहे...";
        
        fetch(APP_URL, { method: 'POST', body: JSON.stringify({action:"verify_belt", belt_no:belt}) })
        .then(r => r.json()).then(d => {
            if(d.status === 'success') {
                isRegistered = d.is_registered;
                document.getElementById('status').innerText = "स्वागत आहे, " + d.name;
                document.getElementById('btnAction').innerText = isRegistered ? "हजेरी नोंदवा" : "चेहरा नोंदणी करा";
                startCam();
            } else {
                alert(d.message);
            }
        });
    }

    function startCam() {
        let video = document.getElementById('video');
        video.style.display = "block";
        navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}})
        .then(s => { 
            video.srcObject = s;
            document.getElementById('btnAction').style.display = "block";
        });

        navigator.geolocation.getCurrentPosition(p => {
            userLat = p.coords.latitude;
            userLon = p.coords.longitude;
        });
    }

    function checkBrightness(ctx, w, h) {
        const data = ctx.getImageData(0, 0, w, h).data;
        let colorSum = 0;
        for(let x = 0; x < data.length; x += 4) {
            colorSum += (data[x] + data[x+1] + data[x+2]) / 3;
        }
        return colorSum / (w * h);
    }

    function takeAttendance() {
        let video = document.getElementById('video');
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);

        // १. अंधार तपासणी (Brightness Check)
        let brightness = checkBrightness(ctx, canvas.width, canvas.height);
        if (brightness < 40) { // जर फोटो खूपच गडद असेल
            alert("खूप अंधार आहे! कृपया उजेडात येऊन हजेरी लावा.");
            return;
        }

        let img = canvas.toDataURL('image/jpeg', 0.6);
        let act = isRegistered ? "mark_attendance" : "register_face";

        document.getElementById('btnAction').disabled = true;
        document.getElementById('btnAction').innerText = "नोंदणी होत आहे...";

        fetch(APP_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: act,
                belt_no: document.getElementById('beltNo').value,
                image: img,
                lat: userLat, lon: userLon
            })
        }).then(r => r.json()).then(d => {
            alert(d.message);
            location.reload();
        }).catch(e => {
            alert("नेटवर्क एरर! पुन्हा प्रयत्न करा.");
            document.getElementById('btnAction').disabled = false;
        });
    }
</script>
</body>
</html>
