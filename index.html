<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA1 Naigaon - Premium Hajeri</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-dark: #0a192f;
            --p-blue: #112240;
            --p-gold: #ffd700;
            --p-green: #00ff88;
            --p-red: #ff3366;
            --text-light: #ccd6f6;
            --glass-bg: rgba(17, 34, 64, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Mukta', 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #020c1b 0%, var(--p-dark) 100%);
            color: var(--text-light);
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .header { 
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(10px);
            width: 100%; 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 2px solid var(--p-gold); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h2 { margin: 0; font-size: 26px; color: white; letter-spacing: 1px; font-weight: 700; text-transform: uppercase; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--p-gold); font-weight: 600; letter-spacing: 2px; }

        .container { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 90%; 
            max-width: 380px; 
            padding: 30px 25px; 
            border-radius: 20px; 
            margin-top: 30px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center; 
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            font-size: 18px; 
            color: white;
            box-sizing: border-box; 
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--p-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        input::placeholder { color: rgba(204, 214, 246, 0.5); letter-spacing: 0; font-weight: 400; }

        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--p-dark); 
            margin-top: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-search { background: var(--p-gold); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .btn-search:hover { background: #ffe033; box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
        
        .btn-reg { background: linear-gradient(45deg, #FF512F 0%, #F09819 100%); color: white; box-shadow: 0 4px 15px rgba(240, 152, 25, 0.4); }
        .btn-att { background: linear-gradient(45deg, #11998e 0%, #38ef7d 100%); color: white; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4); }

        #aiStatus { 
            font-size: 13px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            padding: 10px; 
            border-radius: 8px; 
            background: rgba(255, 215, 0, 0.1); 
            color: var(--p-gold); 
            border: 1px solid rgba(255, 215, 0, 0.2);
            letter-spacing: 1px;
        }

        .video-wrapper {
            position: relative;
            margin-top: 20px;
            border-radius: 15px;
            padding: 4px;
            background: linear-gradient(45deg, var(--p-gold), transparent, var(--p-green));
            display: none;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        #video { 
            width: 100%; 
            border-radius: 12px; 
            background: #000; 
            transform: scaleX(-1); 
            display: block;
        }

        #msg { 
            margin-top: 15px; 
            font-weight: 600; 
            font-size: 15px; 
            padding: 12px; 
            border-radius: 10px; 
            transition: all 0.3s ease;
        }

        .msg-info { background: rgba(0, 255, 136, 0.1); color: var(--p-green); border: 1px solid rgba(0, 255, 136, 0.2); }
        .msg-error { background: rgba(255, 51, 102, 0.1); color: var(--p-red); border: 1px solid rgba(255, 51, 102, 0.2); }
        .blink-alert { background: rgba(255, 215, 0, 0.15); color: var(--p-gold); border: 1px solid var(--p-gold); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.7; } }

        /* Scanning Line Effect */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--p-green);
            box-shadow: 0 0 10px var(--p-green);
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            display: none;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: rgba(204, 214, 246, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>LA1 Naigaon</h2>
    <p>Mumbai Police • Smart Attendance</p>
</div>

<div class="container">
    <div id="aiStatus">🤖 AI System Loading...</div>
    
    <input type="text" id="beltNo" placeholder="Enter Belt No. (उदा. 190055)">
    <button id="btnSearch" class="btn-search" onclick="checkBelt()" disabled>ओळख पटवा (Verify)</button>
    
    <div id="msg" style="display:none;"></div>
    
    <div class="video-wrapper" id="vidWrapper">
        <div class="scan-line" id="scanLine"></div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button id="btnReg" class="btn-reg" style="display:none;" onclick="startLiveness('register_face')">चेहरा नोंदणी करा</button>
    <button id="btnAtt" class="btn-att" style="display:none;" onclick="startLiveness('mark_attendance')">हजेरी लावा (Mark Present)</button>
</div>

<div class="footer">Secure Cloud System • Ver 2.0</div>

<script>
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyoz258DfJgM5KGa1Il8HGJ79nEmlrszX6dL6npHN4DpLHUL1d0-RpeZoCcY-rT1Htt/exec";
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
    
    let DYNAMIC_LOCATIONS = []; 
    let savedDescriptor = null;
    let userLat = "0", userLon = "0";
    let isCheckingLiveness = false;
    let hasBlinked = false;
    let pendingAction = "";
    let userName = "";

    const aiOptions = new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.25, inputSize: 320 });

    window.onload = function() {
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(() => {
            let st = document.getElementById('aiStatus');
            st.innerHTML = "✨ System Ready for Scan"; 
            st.style.color = "var(--p-green)";
            st.style.background = "rgba(0, 255, 136, 0.1)";
            st.style.borderColor = "rgba(0, 255, 136, 0.2)";
            document.getElementById('btnSearch').disabled = false;
        });
    };

    function showMsg(text, type="info") {
        let m = document.getElementById('msg'); 
        m.style.display = "block";
        m.innerText = text;
        m.className = (type === "alert") ? "blink-alert" : (type === "error" ? "msg-error" : "msg-info");
    }

    function checkBelt() {
        let belt = document.getElementById('beltNo').value.trim();
        if(!belt) { showMsg("कृपया बकल नंबर टाका", "error"); return; }

        showMsg("Secure Connection... Fetching Data", "info");
        document.getElementById('btnSearch').disabled = true;

        fetch(GOOGLE_SHEET_URL, { method: 'POST', body: JSON.stringify({action: "verify_belt", belt_no: belt}) })
        .then(r => r.json()).then(data => {
            document.getElementById('btnSearch').disabled = false;
            if(data.status === 'success') {
                DYNAMIC_LOCATIONS = data.locations || []; 
                processUserData(data);
            } else { showMsg("❌ " + data.message, "error"); }
        }).catch(e => {
            showMsg("Network Error. Retrying...", "error");
            document.getElementById('btnSearch').disabled = false;
        });
    }

    function processUserData(data) {
        userName = data.name;
        showMsg("स्वागत आहे (Welcome), " + userName, "info");
        startCam();
        if(data.is_registered && data.descriptor) {
            savedDescriptor = new Float32Array(JSON.parse(data.descriptor));
            document.getElementById('btnAtt').style.display = "block";
            document.getElementById('btnReg').style.display = "none";
        } else {
            document.getElementById('btnReg').style.display = "block";
            document.getElementById('btnAtt').style.display = "none";
        }
    }

    function startCam() {
        document.getElementById('vidWrapper').style.display = "block";
        navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}}).then(s => { document.getElementById('video').srcObject = s; });
        navigator.geolocation.getCurrentPosition(p => { userLat = p.coords.latitude; userLon = p.coords.longitude; });
    }

    function checkCurrentLocation() {
        if(DYNAMIC_LOCATIONS.length === 0) return "Unknown (No Data)";
        const R = 6371e3; const MathPI = Math.PI/180;
        
        for(let loc of DYNAMIC_LOCATIONS) {
            let a = Math.sin((loc.lat-userLat)*MathPI/2) * Math.sin((loc.lat-userLat)*MathPI/2) + Math.cos(userLat*MathPI) * Math.cos(loc.lat*MathPI) * Math.sin((loc.lon-userLon)*MathPI/2) * Math.sin((loc.lon-userLon)*MathPI/2);
            let dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
            if(dist <= loc.radius) return loc.name; 
        }
        return null;
    }

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
    function getEAR(eye) { return (getDistance(eye[1], eye[5]) + getDistance(eye[2], eye[4])) / (2.0 * getDistance(eye[0], eye[3])); }

    function startLiveness(action) {
        if(action === "mark_attendance") {
            let locName = checkCurrentLocation();
            if(!locName) {
                showMsg("❌ Location Mismatch. ड्युटी पॉईंटच्या बाहेर आहात.", "error");
                return;
            }
        }

        pendingAction = action; isCheckingLiveness = true; hasBlinked = false;
        document.getElementById('btnReg').disabled = true; document.getElementById('btnAtt').disabled = true;
        
        document.getElementById('scanLine').style.display = "block"; // Start Scan Anim
        showMsg("👁️ Live Scan: कृपया डोळे मिचकावा (Blink Eyes)", "alert");
        detectLivenessLoop();
    }

    async function detectLivenessLoop() {
        if(!isCheckingLiveness) return;
        try {
            const detection = await faceapi.detectSingleFace(document.getElementById('video'), aiOptions).withFaceLandmarks().withFaceDescriptor();
            if(detection) {
                if (getEAR(detection.landmarks.getLeftEye()) < 0.25) hasBlinked = true;
                else if (hasBlinked && getEAR(detection.landmarks.getLeftEye()) > 0.28) {
                    isCheckingLiveness = false; 
                    document.getElementById('scanLine').style.display = "none"; // Stop Scan Anim
                    executeFinalAction(detection.descriptor); return;
                }
            }
        } catch(e) {}
        setTimeout(detectLivenessLoop, 150);
    }

    function captureExactMoment() {
        let video = document.getElementById('video');
        let canvas = document.createElement('canvas');
        let scale = 320 / video.videoWidth; 
        canvas.width = 320; canvas.height = video.videoHeight * scale;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.5);
    }

    async function executeFinalAction(liveDescriptor) {
        let finalImage = captureExactMoment();
        let belt = document.getElementById('beltNo').value;

        if (pendingAction === "register_face") {
            showMsg("✅ Scan Complete. Uploading Data...", "info");
            let descStr = JSON.stringify(Array.from(liveDescriptor));
            
            fetch(GOOGLE_SHEET_URL, { method: 'POST', body: JSON.stringify({action: "register_face", belt_no: belt, image: finalImage, descriptor: descStr}) })
            .then(r => r.json()).then(d => { alert("✅ नोंदणी पूर्ण (Registration Successful)!"); location.reload(); });
            
        } else if (pendingAction === "mark_attendance") {
            const distance = faceapi.euclideanDistance(savedDescriptor, liveDescriptor);
            if(distance > 0.55) { showMsg("🚨 Identity mismatch. (Proxy Alert)", "error"); document.getElementById('btnAtt').disabled = false; return; }

            let finalLocation = checkCurrentLocation(); 
            showMsg("✅ Attendance Marked!", "info");
            
            alert("✅ " + userName + "\nहजेरी यशस्वीरित्या लागली!\n📍 ठिकाण: " + finalLocation);

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST', body: JSON.stringify({action: "mark_attendance", belt_no: belt, lat: userLat, lon: userLon, locName: finalLocation, image: finalImage})
            });

            setTimeout(() => { location.reload(); }, 1000);
        }
    }
</script>
</body>
</html>
